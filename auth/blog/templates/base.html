<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>django</title>
</head>
<body>
    
    {% if messages %}
        <ul>
            
            {% for mess in messages  %}
                <li>{{mess}}</li>
            {% endfor %}
                
        </ul>
    {% endif %}
    
    {% if user.is_authenticated %}
        <p>Log in as {{user.username}} | <a href="{% url 'logout' %}">logout</a> </p>
    {% else %}
        <a href="{% url  'login' %}">login</a> | <a href="{% url 'register' %}">register</a>
    {% endif %}
        
        
    {% block hero %}
        
    {% endblock hero %}
        
</body>
</html>
